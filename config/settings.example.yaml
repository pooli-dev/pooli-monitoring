prometheus:
  base_url: http://localhost:9090
  timeout_seconds: 15
  step_seconds: 300

alertmanager:
  enabled: false
  base_url: http://localhost:9093
  route: /api/v2/alerts
  default_labels:
    service: pooli-be
    source: pyod-aiops

artifacts:
  dir: artifacts
  rca_db_path: artifacts/rca/rca_events.db

model:
  name: ecod
  contamination: 0.01
  rolling_window: 3
  history_hours: 24
  min_training_rows: 50


detection:
  lookback_points: 8
  alert_score_margin: 0.0
