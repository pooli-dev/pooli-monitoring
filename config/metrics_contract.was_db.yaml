version: 1
application: pooli-be

metrics:
  - key: api_request_rate
    description: Total mapped API requests per second for pooli-be
    required: true
    unit: rps
    aggregation: service
    window: 5m
    promql: |
      sum(
        rate(
          http_server_requests_seconds_count{
            application="pooli-be",
            uri!="UNKNOWN",
            uri!~".*actuator.*"
          }[5m]
        )
      ) or vector(0)

  - key: api_error_rate
    description: Ratio of 5xx requests over mapped API requests
    required: true
    unit: ratio
    aggregation: service
    window: 5m
    promql: |
      (
        sum(
          rate(
            http_server_requests_seconds_count{
              application="pooli-be",
              status=~"5..",
              uri!="UNKNOWN",
              uri!~".*actuator.*"
            }[5m]
          )
        )
        /
        clamp_min(
          sum(
            rate(
              http_server_requests_seconds_count{
                application="pooli-be",
                uri!="UNKNOWN",
                uri!~".*actuator.*"
              }[5m]
            )
          ),
          0.001
        )
      ) or vector(0)

  - key: api_latency_p95
    description: Service-level p95 latency for mapped API requests
    required: true
    unit: seconds
    aggregation: service
    window: 5m
    promql: |
      histogram_quantile(
        0.95,
        sum by (le) (
          rate(
            http_server_requests_seconds_bucket{
              application="pooli-be",
              uri!="UNKNOWN",
              uri!~".*actuator.*"
            }[5m]
          )
        )
      ) or vector(0)

  - key: db_query_rate
    description: Total MyBatis query executions per second
    required: true
    unit: rps
    aggregation: service
    window: 5m
    promql: |
      sum(
        rate(
          mybatis_query_duration_seconds_count{application="pooli-be"}[5m]
        )
      ) or vector(0)

  - key: db_latency_p95
    description: Service-level p95 MyBatis query latency
    required: true
    unit: seconds
    aggregation: service
    window: 5m
    promql: |
      histogram_quantile(
        0.95,
        sum by (le) (
          rate(
            mybatis_query_duration_seconds_bucket{application="pooli-be"}[5m]
          )
        )
      ) or vector(0)

labels:
  required:
    - application
  recommended:
    - instance
    - job
    - uri
    - method
    - status
    - mapper
    - operation
  forbidden:
    - userId
    - sessionId
    - traceId
    - rawPath
    - queryString
