version: 1
application: pooli-be

metrics:
  - key: traffic_db_query_rate_total
    description: Total MyBatis query executions per second in the traffic deduction pipeline
    required: true
    unit: rps
    aggregation: service
    window: 5m
    promql: |
      sum(
        rate(mybatis_query_duration_seconds_count{application="pooli-be"}[5m])
      ) or vector(0)

  - key: traffic_db_query_latency_p95_total
    description: Service-level p95 MyBatis query latency in the traffic deduction pipeline
    required: true
    unit: seconds
    aggregation: service
    window: 5m
    promql: |
      histogram_quantile(
        0.95,
        sum by (le) (
          rate(mybatis_query_duration_seconds_bucket{application="pooli-be"}[5m])
        )
      ) or vector(0)

  - key: refill_deduct_individual_rate
    description: TrafficRefillSourceMapper.deductIndividualRemaining query rate
    required: false
    unit: rps
    aggregation: operation
    window: 5m
    promql: |
      sum(
        rate(
          mybatis_query_duration_seconds_count{
            application="pooli-be",
            mapper="TrafficRefillSourceMapper",
            operation="deductIndividualRemaining"
          }[5m]
        )
      ) or vector(0)

  - key: refill_deduct_individual_p95
