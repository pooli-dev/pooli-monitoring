version: 1
application: pooli-infra

defaults:
  history_hours: 24
  step_seconds: 60
  evaluation_points: 3
  required_breaches: 2
  min_baseline_points: 60
  mad_epsilon: 0.000001

metrics:
  - key: cpu_usage_ratio
    description: Host CPU usage ratio by instance
    unit: ratio
    direction: high
    labels:
      - instance
    warn_z: 2.5
    critical_z: 4.0
    warn_value: 0.20
    critical_value: 0.55
    promql: |
      1 - avg by(instance) (
        rate(node_cpu_seconds_total{mode="idle"}[1m])
      )

  - key: load1_per_cpu
    description: 1-minute load average normalized by CPU core count
    unit: ratio
    direction: high
    labels:
      - instance
    warn_z: 2.0
    critical_z: 3.5
    warn_value: 0.80
    critical_value: 1.20
    promql: |
      node_load1
      /
      clamp_min(
        count by(instance, job) (node_cpu_seconds_total{mode="idle"}),
        1
      )

  - key: memory_available_ratio
    description: Host available memory ratio by instance
    unit: ratio
    direction: low
    labels:
      - instance
    warn_z: 3.0
    critical_z: 4.5
    warn_value: 0.25
    critical_value: 0.15
    promql: |
      node_memory_MemAvailable_bytes
      /
      clamp_min(node_memory_MemTotal_bytes, 1)

  - key: cpu_iowait_ratio
    description: Host CPU iowait ratio by instance
    unit: ratio
    direction: high
    labels:
      - instance
    warn_z: 2.5
    critical_z: 4.0
    warn_value: 0.03
    critical_value: 0.08
    promql: |
      avg by(instance) (
        rate(node_cpu_seconds_total{mode="iowait"}[5m])
      )

  - key: disk_util_ratio
    description: Max disk util ratio by instance
    unit: ratio
    direction: high
    labels:
      - instance
    warn_z: 3.0
    critical_z: 4.5
    warn_value: 0.50
    critical_value: 0.80
    promql: |
      max by(instance) (
        rate(node_disk_io_time_seconds_total{device!~"loop.*|ram.*"}[5m])
      )

  - key: disk_read_latency_ms
    description: Max disk read latency in milliseconds by instance
    unit: ms
    direction: high
    labels:
      - instance
    warn_z: 2.5
    critical_z: 4.0
    warn_value: 10
    critical_value: 25
    promql: |
      1000 * max by(instance) (
        rate(node_disk_read_time_seconds_total{device!~"loop.*|ram.*"}[5m])
        /
        clamp_min(
          rate(node_disk_reads_completed_total{device!~"loop.*|ram.*"}[5m]),
          0.001
        )
      )

  - key: disk_write_latency_ms
    description: Max disk write latency in milliseconds by instance
    unit: ms
    direction: high
    labels:
      - instance
    warn_z: 2.5
    critical_z: 4.0
    warn_value: 10
    critical_value: 25
    promql: |
      1000 * max by(instance) (
        rate(node_disk_write_time_seconds_total{device!~"loop.*|ram.*"}[5m])
        /
        clamp_min(
          rate(node_disk_writes_completed_total{device!~"loop.*|ram.*"}[5m]),
          0.001
        )
      )


  - key: mysql_threads_running
    description: MySQL running thread count by instance
    unit: ''
    direction: high
    labels:
      - instance
    warn_z: 2.5
    critical_z: 4.0
    warn_value: 8
    critical_value: 16
    promql: |
      max by(instance) (
        mysql_global_status_threads_running{job="mysql"}
      )

  - key: mysql_connection_utilization_ratio
    description: MySQL connection utilization ratio by instance
    unit: ratio
    direction: high
    labels:
      - instance
    warn_z: 2.5
    critical_z: 4.0
    warn_value: 0.50
    critical_value: 0.80
    promql: |
      max by(instance) (
        mysql_global_status_threads_connected{job="mysql"}
        /
        clamp_min(mysql_global_variables_max_connections{job="mysql"}, 1)
      )

  - key: mysql_slow_queries_rate
    description: MySQL slow query rate by instance
    unit: ''
    direction: high
    labels:
      - instance
    warn_z: 2.5
    critical_z: 4.0
    warn_value: 0.05
    critical_value: 0.20
    promql: |
      sum by(instance) (
        rate(mysql_global_status_slow_queries{job="mysql"}[5m])
      )

  - key: mysql_innodb_row_lock_waits_5m
    description: MySQL InnoDB row lock waits over five minutes by instance
    unit: ''
    direction: high
    labels:
      - instance
    warn_z: 2.5
    critical_z: 4.0
    warn_value: 1
    critical_value: 3
    promql: |
      sum by(instance) (
        increase(mysql_global_status_innodb_row_lock_waits{job="mysql"}[5m])
      )
