apiVersion: 1

providers:
  - name: 'Traffic Generator Dashboards'
    orgId: 1
    folder: 'Traffic Generator'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 10
    allowUiUpdates: true

    options:
      path: /etc/grafana/dashboards/traffic-generator

  - name: 'Pooli Infrastructure Dashboards'
    orgId: 1
    folder: 'Pooli Infrastructure'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/dashboards/pooli

  - name: 'Pooli Usage Dashboards'
    orgId: 1
    folder: 'Pooli Usage'
    type: file
    disableDeletion: false
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/dashboards/usage
