apiVersion: 1

groups:
  - orgId: 1
    name: loki-alert-group
    folder: Loki Alerts
    interval: 30s   # 알람 체크 주기

    rules:
      - uid: loki_error_alert
        title: Loki ERROR detected
        condition: C
        for: 30s  # 1분 동안 조건 유지되면 알람

        noDataState: OK
        execErrState: Alerting

        data:
          - refId: A
            datasourceUid: loki-ds
            relativeTimeRange:
              from: 120
              to: 0
            model:
              expr: |
                sum by (host, service, logger_name) (
                  count_over_time(
                    {job=~"pooli-be|traffic-generator"}
                    | json
                    | __error__=""
                    | level=~"(?i)error|fatal"
                    [1m]
                  )
                )
              queryType: instant
              refId: A

          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    params:
                      - 5
                    type: gt   # 0보다 크면 alert
                  operator:
                    type: and
                  query:
                    params: ["A"]
                  reducer:
                    type: last

        annotations:
          summary: "ERROR log detected"
          description: '최근 1분 ERROR/FATAL 로그 수: {{ printf "%.0f" $values.A.Value }}'

        labels:
          severity: critical

      - uid: loki_api_5xx_alert
        title: API 5xx Error Spike
        condition: C
        for: 1m

        noDataState: OK
        execErrState: Alerting

        data:
          - refId: A
            datasourceUid: loki-ds
            relativeTimeRange:
              from: 300
              to: 0
            model:
              expr: |
                sum by (apiUri) (
                  count_over_time(
                    {job=~"pooli-be"}
                    | json
                    | __error__=""
                    | message=~"request_log.*"
                    | status=~"5.."
                    [5m]
                  )
                )
              queryType: instant
              refId: A

          - refId: C
            datasourceUid: __expr__
            model:
              type: threshold
              expression: A
              conditions:
                - evaluator:
                    params:
                      - 3
                    type: gt
                  operator:
                    type: and
                  query:
                    params: ["A"]
                  reducer:
                    type: last

        annotations:
          summary: "API 5xx 에러 급증"
          description: '최근 5분간 5xx 에러 {{ printf "%.0f" $values.A.Value }}건 (endpoint: {{ $labels.apiUri }})'

        labels:
          severity: critical
