apiVersion: 1

templates:
  - orgId: 1
    name: discord.custom.title
    template: |
      {{ define "discord.custom.title" -}}
      [{{ .Status | upper }}] {{ .CommonAnnotations.summary }}
      {{- end }}

  - orgId: 1
    name: discord.custom.message
    template: |
      {{ define "discord.custom.message" -}}
      상태: {{ .Status }}
      알람 수: firing={{ len .Alerts.Firing }}, resolved={{ len .Alerts.Resolved }}

      {{- if .Alerts.Firing }}
      {{ range .Alerts.Firing }}
      심각도: {{ index .Labels "severity" }}
      {{ with index .Labels "service" }}서비스: {{ . }}
      {{ end }}{{ with index .Labels "host" }}호스트: {{ . }}
      {{ end }}요약: {{ .Annotations.summary }}
      설명: {{ .Annotations.description }}
      값: {{ .ValueString }}
      {{ with .DashboardURL }}대시보드: {{ . }}
      {{ end }}{{ with .PanelURL }}패널: {{ . }}
      {{ end }}{{ with .SilenceURL }}Silence: {{ . }}
      {{ end }}
      {{ end }}
      {{- else }}
      현재 firing 알람 없음
      {{- end }}

      🔗 Grafana 확인:
        {{ .ExternalURL }}
      {{- end }}
