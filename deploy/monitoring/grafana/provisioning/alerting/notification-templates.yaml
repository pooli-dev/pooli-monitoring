apiVersion: 1

templates:
  - orgId: 1
    name: discord-custom
    template: |
      {{ define "discord.custom.title" }}[{{ .Status | toUpper }}] {{ .CommonAnnotations.summary }}{{ end }}

      {{ define "discord.custom.message" }}
      상태: {{ .Status }}
      알람 수: firing={{ len .Alerts.Firing }}, resolved={{ len .Alerts.Resolved }}

      {{ range .Alerts.Firing }}
      심각도: {{ index .Labels "severity" }}
      서비스: {{ index .Labels "service" }}
      호스트: {{ index .Labels "host" }}
      {{ with index .Labels "logger_name" }}로거: {{ . }}{{ end }}
      요약: {{ .Annotations.summary }}
      설명: {{ .Annotations.description }}
      {{ if .SilenceURL }}Silence: <{{ .SilenceURL }}>{{ end }}
      📋 에러 로그 확인:
      <{{ $.ExternalURL }}explore?schemaVersion=1&panes=%7B%22a%22%3A%7B%22datasource%22%3A%22loki-ds%22%2C%22queries%22%3A%5B%7B%22refId%22%3A%22A%22%2C%22expr%22%3A%22%7Bjob%3D~%5C%22pooli-be%7Ctraffic-generator%5C%22%7D%20%7C%20json%20%7C%20__error__%3D%5C%22%5C%22%20%7C%20level%3D~%5C%22%28%3Fi%29error%7Cfatal%7Cwarn%5C%22%22%2C%22queryType%22%3A%22range%22%7D%5D%2C%22range%22%3A%7B%22from%22%3A%22now-5m%22%2C%22to%22%3A%22now%22%7D%7D%7D&orgId=1>

      {{ end }}
      {{ end }}