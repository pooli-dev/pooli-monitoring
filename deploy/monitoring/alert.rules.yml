groups:
- name: basic_alerts
  interval: 30s
  rules:

  - alert: HighCPUWarning
    expr: 100 - (avg by(instance)(rate(node_cpu_seconds_total{mode="idle"}[1m])) * 100) > 60
    for: 2m
    labels:
      severity: warning
    annotations:
      summary: "High CPU usage"
      description: "CPU usage is above 60% on {{ $labels.instance }}"

  - alert: HighCPU
    expr: 100 - (avg by(instance)(rate(node_cpu_seconds_total{mode="idle"}[1m])) * 100) > 80
    for: 1m
    labels:
      severity: critical
    annotations:
      summary: "High CPU usage"
      description: "CPU usage is {{ $value }}% on {{ $labels.instance }}"

  - alert: HighLoadPerCpu
    expr: (node_load1 / clamp_min(count by(instance, job) (node_cpu_seconds_total{mode="idle"}), 1)) > 1.2
    for: 2m
    labels:
      severity: warning
    annotations:
      summary: "High load per CPU"
      description: "Load per CPU is above 1.2 on {{ $labels.instance }}"

  - alert: HighMemory
    expr: (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100 < 20
    for: 1m
    labels:
      severity: warning
    annotations:
      summary: "High Memory usage"
      description: "Memory usage is above 80% on {{ $labels.instance }}"

  - alert: HighDiskWarning
    expr: (node_filesystem_size_bytes{fstype!~"tmpfs|overlay",mountpoint="/"} - node_filesystem_free_bytes{fstype!~"tmpfs|overlay",mountpoint="/"}) / node_filesystem_size_bytes{fstype!~"tmpfs|overlay",mountpoint="/"} * 100 > 80
    for: 2m
    labels:
      severity: warning
    annotations:
      summary: "High Disk usage"
      description: "Disk usage is above 80% on {{ $labels.instance }}"

  - alert: HighDisk
    expr: (node_filesystem_size_bytes{fstype!~"tmpfs|overlay",mountpoint="/"} - node_filesystem_free_bytes{fstype!~"tmpfs|overlay",mountpoint="/"}) / node_filesystem_size_bytes{fstype!~"tmpfs|overlay",mountpoint="/"} * 100 > 90
    for: 1m
    labels:
      severity: critical
    annotations:
      summary: "High Disk usage"
      description: "Disk usage is above 90% on {{ $labels.instance }}"


